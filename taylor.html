    (function() {

          content: {
            theory: `
              <div class="card"><h3>💣 Взрывное устройство (ВУ)</h3><p>Техническое устройство одноразового применения, обладающее способностью взрываться. Изготовлено особым образом. Предназначено для поражения или уничтожения людей, а также повреждения объектов. Состоит из заряда взрывчатого вещества (ВВ) и средства его взрывания.</p></div>
              <div class="card"><h3>🧨 Самодельное взрывное устройство (СВУ)</h3><p>Изготовлено в кустарных условиях. В составе: ВВ (в т.ч. имитационные и пиротехнические средства), горючие составы, средства инициирования. Делится на <strong>механическое</strong> (подрыв от физического воздействия) и <strong>дистанционное C4</strong> (подрыв по радиосигналу или таймеру).</p></div>
              <div class="card"><h3>📋 Типы взрывных устройств</h3><ol><li>Самодельное взрывное устройство (СВУ).</li><li>Пояс смертника.</li><li>Растяжки.</li><li>Мины.</li></ol></div>
              <div class="card"><h3>🔧 Справочник устройств</h3><ul><li><strong>БРВУ «Пелена 12-М»</strong> — блокиратор радиосигналов в радиусе 60 метров. Глушилка. Включается первым.</li><li><strong>ДРП (Детектор радиопомех)</strong> — три лампы: красная (15-30м), жёлтая (5-15м), зелёная (0-5м).</li><li><strong>КТЗ «Дублон-2»</strong> — костюм телесной защиты сапёра.</li><li><strong>ЭТЦ-3</strong> — тяжёлый контейнер (до 360 кг). Для дальних перевозок. Альтернатива — ЭТЦ-1 (лёгкий).</li><li><strong>Локализатор «Фонтан-2»</strong> — лёгкий контейнер (30-40 кг).</li><li><strong>Детонатор</strong> — устройство для передачи напряжения в медную проволоку при контролируемом подрыве.</li></ul></div>
              <div class="card"><h3>⚡ Иерархия проводов</h3><ol><li><strong>Фазный</strong> (+23.6…+23.9В) — питание. Режется первым.</li><li><strong>Заземление</strong> (0В, жёлто-зелёный) — замыкает цепь. Режется вторым.</li><li><strong>Телемеханика</strong> (0-5В нестабильно) — антенна, только в С4. Режется третьим.</li><li><strong>Дискретный</strong> (0В) — провод таймера. Если таймера нет — отсутствует. Режется четвёртым.</li><li><strong>Минусовой</strong> (-23.6…-23.9В) — обратная цепь. Режется последним.</li></ol><div class="note">Механика: + → 0 → дискрет → -</div><div class="note">С4: + → 0 → телемех → дискрет → -</div></div>
            `,
            algorithm: `
              <div class="card"><h3>📋 Общие правила обезвреживания</h3><ol><li>Убедиться, что нет гражданских и угрозы жизни.</li><li>Снять бронежилет, каску, разгрузку. Надеть КТЗ и резиновые перчатки.</li><li>Установить и включить БРВУ.</li><li>Найти ВУ (ДРП или визуально).</li><li>Внимательно осмотреть, определить тип.</li><li>Приступить к обезвреживанию.</li></ol><div class="warning">Если таймер показывает менее 3 минут — разминирование запрещено! Выброс в море или карьер.</div></div>
              <div class="card"><h3>🔍 Обезвреживание СВУ дистанционного типа (С4)</h3><p><strong>Порядок действий:</strong></p><ol><li>По приезду осмотреть территорию.</li><li>Сложить обмундирование в багажник. Надеть КТЗ и резиновые перчатки.</li><li>Установить и включить БРВУ.</li><li>Если расположение неизвестно — поиск с ДРП.</li><li>Обнаружив — расположить кейс сапёра в 1 метре от СВУ.</li><li>Включить фонарик, осмотреть СВУ. Если закрыто крышкой — открепить её.</li><li>Просветить внутренности. Узнать количество проводов.</li><li>Проверить наличие таймера и значение.</li><li>Достать мультиметр. Режим DC 200V.</li><li>Прозвонить каждый провод: красный щуп к первому проводу, чёрный ко второму.</li><li>Перекусить провода по иерархии: Фазный → Заземление → Телемеханика → Дискретный (если есть) → Минусовой. Итог: СВУ обесточено.</li><li>Поднести контейнер. Ножом извлечь тротиловую шашку, шашку взрывателя, капсюль. Итог: СВУ обезврежено.</li><li>Уложить компоненты в контейнер. Вывезти на полигон ВЧ для контролируемого подрыва.</li></ol></div>
              <div class="card"><h3>🔧 Обезвреживание СВУ механического типа</h3><p>Алгоритм полностью совпадает с С4, за исключением: провод «Телемеханика» отсутствует. Иерархия: Фазный → Заземление → Дискретный (если есть таймер) → Минусовой.</p></div>
              <div class="card"><h3>💀 Обезвреживание Пояса смертника</h3><ol><li>По приезду осмотреть территорию. Снять обмундирование. Надеть КТЗ и перчатки.</li><li>Включить БРВУ.</li><li>Осмотреть человека с поясом. <strong>Если без сознания — сначала обезвредить ВУ, потом ПП.</strong></li><li>Расположить кейс в 1 метре. Включить фонарик, осмотреть.</li><li>Если пояс закрыт крышкой — открепить. Просветить внутренности, узнать количество проводов и наличие таймера.</li><li>Мультиметр DC 200V. Прозвон каждого провода.</li><li>Перекусить по иерархии: Фазный → Заземление → Телемеханика → Дискретный → Минусовой.</li><li>Обесточили — извлечь тротиловую шашку, взрыватель, капсюль.</li><li>Компоненты в контейнер. Снять пояс с человека, утилизировать. Вывезти на полигон ВЧ.</li></ol></div>
              <div class="card"><h3>💥 Контролируемый подрыв</h3><ol><li>Выкопать яму глубиной 2-3 м у бетонной стены на полигоне ВЧ.</li><li>Поместить ВУ в яму (собрать в обратном порядке).</li><li>Подсоединить медную проволоку одним концом к ВУ.</li><li>Закопать. Протянуть проволоку на 100 метров.</li><li>Подключить детонатор ко второму концу.</li><li>Лечь за укрытие. Нажать кнопку. Итог: ВУ взорвано.</li></ol></div>
            `,
            rp_do: `
              <div class="card"><h3>👥 RP-отыгровка сапёра</h3><p>Работа с ВУ — последовательный процесс. Нельзя «открыть СВУ» или «обезвредить» одной командой. Все действия через /do и /me. Спешка или пропуск этапов делает отыгровку недействительной.</p></div>
              <div class="card"><h3>📝 Команды /me (описание действий)</h3><ul><li><code>/me медленно опускается на колено перед объектом, включает налобный фонарик.</code></li><li><code>/me достаёт из кейса мультиметр и выставляет режим DC 200V.</code></li><li><code>/me аккуратно прикладывает красный щуп к первому контакту, чёрный — к корпусу.</code></li><li><code>/me изолированным ножом осторожно поддевает край крышки, приподнимая на 2-3 см.</code></li><li><code>/me замирает, заметив тонкую леску, уходящую под корпус.</code></li><li><code>/me плавно обхватывает корпус гранаты, просовывая палец в кольцо чеки.</code></li><li><code>/me бокорезами перекусывает фазный провод.</code></li></ul></div>
              <div class="card"><h3>🔍 Команды /do (запрос информации)</h3><p><strong>Осмотр корпуса:</strong></p><ul><li><code>/do Есть ли корпус у устройства?</code></li><li><code>/do Из какого материала корпус?</code></li><li><code>/do Сколько болтов на корпусе?</code></li><li><code>/do Есть ли крышка?</code></li><li><code>/do Есть ли напряжение на корпусе?</code></li></ul><p><strong>Вскрытие:</strong></p><ul><li><code>/do Под крышкой есть леска или натяжной механизм?</code></li></ul><p><strong>Внутренности:</strong></p><ul><li><code>/do Сколько проводов внутри?</code></li><li><code>/do Есть ли таймер? Какое значение?</code></li><li><code>/do Какого цвета провод №X?</code></li><li><code>/do Какое напряжение на проводе №X?</code></li></ul></div>
              <div class="card"><h3>🎬 Пример полной сцены</h3><div class="code-block">/me опускается на колено перед объектом, включает налобный фонарик.
/do Есть ли корпус у устройства?
... ответ: да, металлический корпус на четырёх болтах ...
/me достаёт мультиметр, выставляет DC 200V.
/do Есть ли напряжение на корпусе?
... ответ: да, +23.8В ...
/me кивает. «Фазный на корпусе.» Берёт бокорезы.
/me аккуратно перекусывает фазный провод.</div></div>

      const tabsContainer = document.getElementById('tabsContainer');
      const tabContentArea = document.getElementById('tabContentArea');

      function init() {
        renderSection();
        menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
        document.addEventListener('click', (e) => {
          if (!sidebar.contains(e.target) && e.target !== menuToggle && sidebar.classList.contains('open')) {
            sidebar.classList.remove('open');
          }
        });
        navLinks.forEach(link => {
          link.addEventListener('click', function() {
            navLinks.forEach(l => l.classList.remove('active'));
            this.classList.add('active');
            currentSection = this.getAttribute('data-section');
            const data = contentData[currentSection];
            currentTab = data.tabs && data.tabs.length > 0 ? data.tabs[0].id : '';
            renderSection();
            if (window.innerWidth <= 768) sidebar.classList.remove('open');
          });
        });
        searchInput.addEventListener('input', function() {
          const query = this.value.toLowerCase();
          navLinks.forEach(link => {
            link.parentElement.style.display = link.textContent.toLowerCase().includes(query) ? 'block' : 'none';
          });
        });
      }

      function renderSection() {
        const data = contentData[currentSection];
        sectionTitle.textContent = data.title;
        breadcrumbPath.textContent = data.breadcrumb;
        tabsContainer.innerHTML = '';
        if (data.tabs && data.tabs.length > 0) {
          data.tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${tab.id === currentTab ? 'active' : ''}`;
            btn.textContent = tab.label;
            btn.addEventListener('click', () => {
              currentTab = tab.id;
              document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
              btn.classList.add('active');
              renderContent();
            });
            tabsContainer.appendChild(btn);
          });
          renderContent();
        } else {
          tabContentArea.innerHTML = '<div class="card"><p>Раздел находится в разработке.</p></div>';
        }
      }

      function renderContent() {
        const data = contentData[currentSection];
        tabContentArea.innerHTML = data.content[currentTab] || '<div class="card"><p>Нет содержимого.</p></div>';
      }

      init();
