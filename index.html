      z-index: 1;

      font-weight: 500;
      padding: 10px 20px;

      border-bottom: 2px solid transparent;

      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;

    .tab-content.active {
      display: block;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }

    .card {
      background-color: rgba(18, 21, 26, 0.7);
      backdrop-filter: blur(10px);

      font-size: 0.9rem;

    .card ul, .card ol {

    .warning {

      border-left: 3px solid var(--red-bright);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
      font-size: 0.85rem;
      color: var(--red-bright);

    .note {
      background-color: rgba(130, 80, 200, 0.08);
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
      font-size: 0.85rem;
      color: var(--accent);
    }

    .tactic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 12px;
      align-items: stretch;
    }

    .tactic-card {
      background-color: rgba(18, 21, 26, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
    }

    .tactic-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);

    .tactic-card h4 {
      color: #ffffff;

    .tactic-card img {

    .placeholder-img {

      display: flex;

    .site-footer {

    .site-footer:hover {

      border-color: rgba(255, 255, 255, 0.1);

    .site-footer a {

    .watermark-badge {

      bottom: 70px;
      left: 24px;
      background: rgba(18, 21, 26, 0.6);

      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      z-index: 105;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      pointer-events: auto;
      transition: transform var(--transition), border-color var(--transition), background var(--transition), box-shadow var(--transition);
    }

    .watermark-badge span {
      color: var(--accent);
      font-weight: 600;
    }

    .watermark-badge:hover {
      transform: translateY(-3px);
      background: rgba(18, 21, 26, 0.8);
      border-color: rgba(166, 132, 230, 0.3);
      box-shadow: 0 6px 20px rgba(130, 80, 200, 0.15);
    }

    .menu-toggle {
      display: none;
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 200;
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.3rem;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
        padding: 24px 18px 80px;
      }
      .menu-toggle {
        display: block;
      }
      .tactic-grid {
        grid-template-columns: 1fr;
      }
      .section-header h1 {
        font-size: 1.6rem;
      }
      .site-footer {
        left: 12px;
        bottom: 12px;
        font-size: 0.65rem;
        padding: 6px 10px;
      }
      .watermark-badge {
        left: 12px;
        bottom: 60px;
        font-size: 0.7rem;
        padding: 6px 12px;
      }
    }
  </style>
</head>

  <script>
    (function() {
      const contentData = {
        svu: {
          title: 'СВУ / Разминирование',
          breadcrumb: 'СВУ',
          tabs: [
            { id: 'theory', label: '📘 Теория' },
            { id: 'algorithm', label: '⚙️ Алгоритм' },
            { id: 'rp_do', label: '🎮 Отыгровки (/do)' },
            { id: 'rp_try', label: '🎮 Отыгровки (/try)' }
          ],
          content: {
            theory: `
              <div class="card">
                <h3>💣 Классификация взрывных устройств</h3>
                <p>Взрывное устройство (ВУ) — техническое устройство одноразового применения, обладающее способностью взрываться. Состоит из заряда взрывчатого вещества (ВВ) и средства взрывания (детонатора).</p>
                <p><strong>Типы ВУ:</strong></p>
                <ul>
                  <li><strong>Самодельное взрывное устройство (СВУ)</strong> — изготовлено кустарно. Делится на <em>механические</em> (проводное управление, таймер) и <em>дистанционные</em> (радиоуправление, C4).</li>
                  <li><strong>Растяжки</strong> — мины-ловушки, использующие натяжную проволоку или леску.</li>
                  <li><strong>Мины</strong> — скрытно установленные ВУ с нажимным, натяжным или комбинированным взрывателем.</li>
                </ul>
                <div class="note">Пояс смертника запрещён на сервере BLACK. Данный тип ВУ исключён из методички.</div>
              </div>
              <div class="card">
                <h3>🔧 Справочник устройств</h3>
                <ul>
                  <li><strong>БРВУ "Пелена 12-М"</strong> — блокиратор радиовзрывных устройств. Создаёт помехи в радиусе 60 метров, предотвращая дистанционный подрыв.</li>
                  <li><strong>ДРП (Детектор радиопомех)</strong> — устройство для поиска ВУ. Три лампы: <span style="color:#f85149">красная</span> (15–30 м), <span style="color:#d29922">жёлтая</span> (5–15 м), <span style="color:#3fb950">зелёная</span> (0–5 м).</li>
                  <li><strong>КТЗ "Дублон-2"</strong> — костюм телесной защиты сапёра. Защищает жизненно важные органы при подрыве.</li>
                  <li><strong>ЭТЦ-3</strong> — тяжёлый взрывозащитный контейнер (до 360 кг). Для длительных перевозок.</li>
                  <li><strong>Локализатор "Фонтан-2"</strong> — лёгкий контейнер (30–40 кг). Для коротких дистанций.</li>
                  <li><strong>Мультиметр</strong> — прибор для измерения напряжения. Режим постоянного тока 200В.</li>
                  <li><strong>Бокорезы, изолированный нож, индикаторная отвёртка</strong> — инструменты для работы с проводами и корпусом.</li>
                </ul>
              </div>
              <div class="card">
                <h3>🎒 Набор сапёра (в кейсе)</h3>
                <p>Перед началом работы убедись, что всё необходимое находится в багажнике служебного транспорта. Часть предметов уже уложена в кейс сапёра.</p>
                <p><strong>Из багажника нужно достать:</strong></p>
                <ul>
                  <li>КТЗ "Дублон-2"</li>
                  <li>БРВУ "Пелена 12-М"</li>
                  <li>ДРП</li>
                  <li>Взрывозащитный контейнер (ЭТЦ-3 или Фонтан-2)</li>
                  <li>Катушка с медной проволокой (для подрыва)</li>
                  <li>Детонатор</li>
                </ul>
                <p><strong>Внутри кейса сапёра находятся:</strong></p>
                <ul>
                  <li>Мультиметр</li>
                  <li>Бокорезы</li>
                  <li>Изолированный нож</li>
                  <li>Фонарик</li>
                  <li>Индикаторная отвёртка</li>
                  <li>Резиновые перчатки</li>
                </ul>
                <div class="warning">Пелена-12 и ЭТЦ-3 тяжёлые — для их переноски требуются минимум два человека.</div>
              </div>
              <div class="card">
                <h3>⚡ Иерархия проводов (порядок перекусывания)</h3>
                <p><em>Ошибка в порядке — гарантированный подрыв.</em></p>
                <ol>
                  <li><strong>Фазный</strong> (+23.6…+23.9 В) — подача напряжения на корпус.</li>
                  <li><strong>Заземление</strong> (0 В, жёлто-зелёный) — защита от неконтролируемого взрыва.</li>
                  <li><strong>Телемеханика</strong> (0–5 В, нестабильно при БРВУ) — канал дистанционного управления.</li>
                  <li><strong>Дискретный</strong> (0 В) — передача сигнала на детонатор после истечения таймера. Отсутствует, если нет таймера.</li>
                  <li><strong>Минусовой</strong> (-23.6…-23.9 В) — обратная подача напряжения.</li>
                </ol>
                <div class="note">Обычно в СВУ бывает от 2 до 5 проводов. Если таймера нет, дискретный провод не устанавливается. Порядок перекусывания всегда один и тот же: сначала плюс, потом минус, в конце ноль.</div>
              </div>
            `,
            algorithm: `
              <div class="card">
                <h3>📋 Общий протокол обезвреживания</h3>
                <ol>
                  <li>Оценить обстановку, убедиться в отсутствии гражданских лиц.</li>
                  <li>Снять бронежилет, каску, разгрузку, сложить в багажник.</li>
                  <li>Надеть КТЗ "Дублон-2" и резиновые перчатки.</li>
                  <li>С помощью ДРП или визуально обнаружить ВУ.</li>
                  <li>Вернуться к машине, взять Пелену-12 (при помощи напарника), установить и включить её рядом с ВУ.</li>
                  <li>Расположить кейс сапёра на расстоянии одного метра от ВУ.</li>
                  <li>Осмотреть ВУ. Определить тип, количество болтов на крышке (обычно 3-4), наличие ловушек (леска, контакт), количество проводов, наличие таймера.</li>
                  <li>Проверить напряжение каждого провода мультиметром. Черный щуп — на корпус (если металлический) или на заземление/металлическую раму, красный — по очереди на каждый провод.</li>
                  <li>Перекусить провода строго по иерархии (сначала "+", потом "-", потом "0").</li>
                  <li>Извлечь взрыватель, капсюль, тротиловую шашку.</li>

                <p>В критической ситуации допустимо сокращать формат, но тег, звание и суть обязательны.</p>
                <div class="code-block">/d [УМВД] Оперуполномоченный ОУР Тейлор. Офицер ранен, эвакуация, Калинина 19.
/d [УМВД] Старшина полиции Иванов. Нападение на пост, подкрепление, рынок.</div>
              </div>
              <div class="card">
                <h3>🛡️ Особенности для сотрудников ОУР</h3>
                <p>У ОУР нет позывных. Всегда указывается звание, фамилия и подразделение. Это правило действует для всех оперативников, кроме спецподразделений.</p>
                <div class="code-block">/d [УМВД] Капитан полиции Тейлор, оперуполномоченный ОУР.</div>
                <p>Если вы в маске и не хотите раскрывать фамилию, допустимо ограничиться должностью:</p>
                <div class="code-block">/d [УМВД] Оперуполномоченный ОУР.</div>
                <p>Но в официальных вызовах и при первом контакте лучше использовать полный формат.</p>
              </div>
              <div class="card">
                <h3>🚨 Ответственность за нарушения</h3>
                <p>Любое нарушение правил работы в /d влечёт за собой наказание. Самое распространённое — мьют (блокировка доступа) на срок от 60 до 120 минут. При систематических нарушениях сотрудник может быть привлечён к дисциплинарной ответственности по Федеральному постановлению N-1.</p>
                <div class="warning">Помните: рация департамента — это не чат для общения. Это рабочий инструмент для координации государственных служб.</div>

            `
          }

          content: {

            sapper: `<div class="card"><h3>Сапёрные скрипты</h3><p>Полные сценарии см. в разделе СВУ (вкладки Отыгровки /do и /try).</p></div>`,
            assault_rp: `<div class="card"><h3>Штурмовые скрипты</h3><p>Полные сценарии см. в разделе Штурм (вкладка Отыгровки).</p></div>`,

          }

        dictionary: {
          title: 'Справочник (НПА)',
          breadcrumb: 'Справочник',
          tabs: [
            { id: 'laws', label: '📜 Законы' }
          ],
          content: {
            laws: `
              <div class="card">
                <h3>Иерархия нормативных правовых актов</h3>
                <ol>
                  <li><strong>Конституция</strong> — высший закон, прямое действие.</li>

                  <li><strong>Приказ</strong> — акт министерства или ведомства.</li>

              </div>
              <div class="card">
                <h3>Ключевые термины</h3>
                <p><strong>НПА</strong> — нормативный правовой акт (закон, указ, постановление, приказ).<br>
                   <strong>ФЗ</strong> — федеральный закон.<br>
                   <strong>ФКЗ</strong> — федеральный конституционный закон.<br>
                   <strong>КоАП</strong> — кодекс об административных правонарушениях.<br>
                   <strong>УК</strong> — уголовный кодекс.<br>
                   <strong>УПК</strong> — уголовно-процессуальный кодекс.<br>
                   <strong>КТО</strong> — контртеррористическая операция.<br>
                   <strong>ЧП</strong> — чрезвычайное положение.<br>
                   <strong>ВП</strong> — военное положение.</p>
              </div>
            `
          }
        }
      };

      const sidebar = document.getElementById('sidebar');
      const menuToggle = document.getElementById('menuToggle');
      const sectionTitle = document.getElementById('sectionTitle');
      const breadcrumbPath = document.getElementById('breadcrumbPath');
      const tabsContainer = document.getElementById('tabsContainer');
      const tabContentArea = document.getElementById('tabContentArea');
      const searchInput = document.getElementById('searchInput');
      const navLinks = document.querySelectorAll('.nav-list a');

      let currentSection = 'svu';
      let currentTab = 'theory';

      function renderSection(sectionId) {
        const data = contentData[sectionId];
        if (!data) return;
        currentSection = sectionId;
        sectionTitle.textContent = data.title;
        breadcrumbPath.textContent = data.breadcrumb;
        tabsContainer.innerHTML = '';
        data.tabs.forEach(tab => {
          const btn = document.createElement('button');
          btn.className = 'tab-btn';
          btn.dataset.tab = tab.id;
          btn.textContent = tab.label;
          btn.addEventListener('click', () => switchTab(sectionId, tab.id));
          tabsContainer.appendChild(btn);
        });
        const firstTab = data.tabs[0]?.id || 'theory';
        switchTab(sectionId, firstTab);
        navLinks.forEach(link => {
          link.classList.remove('active');
          if (link.dataset.section === sectionId) link.classList.add('active');
        });
      }

      function switchTab(sectionId, tabId) {
        currentTab = tabId;
        const data = contentData[sectionId];
        if (!data) return;
        const buttons = tabsContainer.querySelectorAll('.tab-btn');
        buttons.forEach(btn => {
          btn.classList.remove('active');
          if (btn.dataset.tab === tabId) btn.classList.add('active');
        });
        const html = data.content[tabId] || '<p>Контент отсутствует.</p>';
        tabContentArea.innerHTML = html;
      }

      navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const sectionId = link.dataset.section;
          if (sectionId && contentData[sectionId]) {
            renderSection(sectionId);
            sidebar.classList.remove('open');
          }
        });
      });

      menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
      document.addEventListener('click', (e) => {
        if (window.innerWidth <= 768 && !sidebar.contains(e.target) && e.target !== menuToggle) {
          sidebar.classList.remove('open');
        }
      });

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        navLinks.forEach(link => {
          link.style.display = link.textContent.toLowerCase().includes(query) ? 'flex' : 'none';
        });
      });

      renderSection('svu');
    })();
  </script>
</body>
</html>
